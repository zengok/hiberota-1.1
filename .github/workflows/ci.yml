name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hiberota
          POSTGRES_USER: hiberota
          POSTGRES_PASSWORD: hiberota_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hiberota -d hiberota"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DJANGO_SECRET_KEY: ci-only-secret
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      HIBEROTA_TEST_SQLITE: "false"
      POSTGRES_DB: hiberota
      POSTGRES_USER: hiberota
      POSTGRES_PASSWORD: hiberota_ci_password
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://127.0.0.1:6379/0
      CELERY_BROKER_URL: redis://127.0.0.1:6379/0
      CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/0

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/dev.txt
      - name: Install dependencies
        run: pip install -r requirements/dev.txt
      - name: Django checks
        run: |
          python manage.py check
          python manage.py check --deploy --settings=config.settings.production
          python manage.py makemigrations --check --dry-run
      - name: Tests
        run: pytest
      - name: Lint and format
        run: |
          ruff check .
          ruff format --check .
      - name: Types
        run: mypy .
      - name: Security
        run: |
          bandit -r apps config automation
          pip-audit
      - name: Build application image
        run: docker build -t hiberota:ci .
      - name: Container vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: hiberota:ci
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
