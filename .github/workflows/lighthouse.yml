name: Lighthouse CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DJANGO_SECRET_KEY: ci-lighthouse-only-secret
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      HIBEROTA_TEST_SQLITE: "true"
      GA4_MEASUREMENT_ID: ""
      ADSENSE_ENABLED: "false"
      CMP_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/dev.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Python dependencies
        run: pip install -r requirements/dev.txt
      - name: Prepare Django
        run: |
          python manage.py migrate --noinput
          python manage.py collectstatic --noinput
      - name: Start Django
        run: |
          python manage.py runserver 127.0.0.1:8110 --insecure &
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:8110/health/live && exit 0
            sleep 1
          done
          exit 1
      - name: Run Lighthouse CI
        run: npx -y @lhci/cli autorun --config=lighthouserc.json
