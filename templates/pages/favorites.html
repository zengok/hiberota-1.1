{% extends "base.html" %}

{% block content %}
  <section class="page-intro" style="padding:34px 40px 24px;border-bottom:1px solid #EEF3F0">
    <div style="max-width:1200px;margin:0 auto">
      <h1 style="margin:0 0 8px;font-size:30px;font-weight:800;letter-spacing:-.02em;color:#14211B">Favoriler</h1>
      <p style="margin:0;font-size:15.5px;color:#586B61">Favoriler bu cihazda saklanır; hesap veya profil oluşturulmaz.</p>
    </div>
  </section>

  <section style="padding:26px 40px 56px;max-width:1200px;margin:0 auto">
    <div style="display:flex;align-items:center;gap:9px;background:#F1F6F3;border-radius:12px;padding:12px 16px;margin-bottom:24px;max-width:560px" data-favorite-empty hidden>
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#15875C" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="16" x2="12" y2="11"/><circle cx="12" cy="8" r=".6" fill="#15875C"/></svg>
      <span style="font-size:13px;color:#586B61">Henüz favori çağrı yok. Çağrı kartlarından favori ekleyebilirsiniz.</span>
    </div>
    <div
      class="call-grid"
      data-favorite-list-root
      data-resolve-url="{% url 'favorite-resolve' %}"
      aria-live="polite"
    ></div>
  </section>
{% endblock %}
