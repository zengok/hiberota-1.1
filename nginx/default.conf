map $http_x_forwarded_proto $hiberota_forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

server {
    listen 80;
    server_name _;

    server_tokens off;
    client_max_body_size 10m;

    location /static/ {
        alias /srv/hiberota/static/;
        autoindex off;
    }

    location /media/ {
        alias /srv/hiberota/media/;
        autoindex off;
    }

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $hiberota_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
    }
}
