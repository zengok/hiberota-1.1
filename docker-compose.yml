services:
  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS -H 'Host: hiberota.com' -H 'X-Forwarded-Proto: https' http://localhost:8000/health/live || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - staticfiles:/app/staticfiles
      - media:/app/media
    logging: &default-logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  celery_worker:
    build: .
    command: celery -A config.celery worker --loglevel=INFO
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A config.celery inspect ping -d celery@$${HOSTNAME} >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging

  celery_beat:
    build: .
    command: celery -A config.celery beat --loglevel=INFO --schedule=/tmp/celerybeat-schedule
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"from pathlib import Path; cmd=Path('/proc/1/cmdline').read_text(); raise SystemExit(0 if 'celery' in cmd and 'beat' in cmd else 1)\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hiberota}
      POSTGRES_USER: ${POSTGRES_USER:-hiberota}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/srv/hiberota/static:ro
      - media:/srv/hiberota/media:ro
    logging: *default-logging

volumes:
  postgres_data:
  staticfiles:
  media:
